<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Zerg Army Builder - StarCraft TMG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0d1118;
      --panel: #171d28;
      --panel-2: #1d2531;
      --panel-3: #263140;
      --text: #f0eee8;
      --muted: #a9b0bb;
      --border: #344256;
      --accent: #9333ea;
      --accent-rgb: 147, 51, 234;
      --menu-rgb: 147, 51, 234;
      --success: #22c55e;
      --warning: #fbbf24;
      --error: #ef4444;
      --gas: #22d3ee;
      --role-hero: #f59e0b;
      --role-elite: #a855f7;
      --role-core: #3b82f6;
      --role-support: #22c55e;
      --role-other: #6b7280;
      --tactical: #06b6d4;
      --glossary: #ec4899;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(59,130,246,0.08), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(147,51,234,0.09), transparent 22%),
        linear-gradient(180deg, #111722 0%, var(--bg) 22%, #0a0e15 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      padding-bottom: 65px;
      overflow-x: hidden;
      scrollbar-width: none;
    }
    body::-webkit-scrollbar { width: 0; height: 0; display: none; }
    
    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 12px 12px;
    }
    
    /* Header */
    .header {
      text-align: center;
      padding: 16px 64px 20px;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--accent);
      background:
        linear-gradient(180deg, rgba(59,130,246,0.05), transparent 42%),
        radial-gradient(circle at 50% 0%, rgba(var(--accent-rgb),0.14), transparent 34%);
    }
    .header h1 {
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .header h1 span { color: var(--accent); }
    
    /* Sticky Header */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 250;
      background:
        radial-gradient(circle at top center, rgba(var(--menu-rgb), 0.12), transparent 46%),
        linear-gradient(180deg, rgb(34, 30, 50), rgb(31, 28, 47) 68%, rgb(27, 25, 41));
      backdrop-filter: none;
      width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      padding:
        calc(env(safe-area-inset-top, 0px) + 12px)
        max(16px, calc((100vw - 480px) / 2 + 12px))
        10px;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 12px 22px rgba(4,8,15,0.22);
      overflow-x: clip;
    }
    
    /* Battle Size - only shown in Factions tab */
    .battle-size-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .battle-size-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }
    .battle-size-options {
      display: flex;
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01)), var(--panel);
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
      border: 1px solid var(--border);
    }
    .battle-size-option {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .battle-size-option.active {
      color: var(--text);
      background: var(--accent);
    }
    .battle-size-option:not(.active):hover {
      color: var(--text);
      background: var(--panel-2);
    }

    .resource-stats {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      width: 100%;
      margin: 0 0 8px;
      padding: 10px 18px 10px;
      background: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: all 0.25s ease;
    }
    .resource-stat {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      background: transparent;
      border: none;
      transition: all 0.25s ease;
    }
    .resource-stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
      transition: all 0.25s ease;
    }
    .resource-stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      transition: all 0.25s ease;
    }
    .resource-stat-value.minerals { color: var(--warning); }
    .resource-stat-value.gas { color: var(--gas); }
    .resource-stat-value.supply { color: var(--accent); }
    .resource-stat-value.over { color: var(--error); }
    
    .sticky-header.compact .resource-stats {
      gap: 20px;
      width: 100%;
      margin: 0 0 8px;
      padding: 8px 14px 8px;
      margin-bottom: 8px;
    }
    .sticky-header.compact .resource-stat {
      gap: 6px;
      background: transparent;
      border: none;
    }
    .sticky-header.compact .resource-stat-label {
      font-size: 0.65rem;
    }
    .sticky-header.compact .resource-stat-value {
      font-size: 1rem;
    }
    
    /* Slots row */
    .slots-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
    }
    .slot-badge {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 100px;
      font-weight: 600;
    }
    .slot-badge.ok { background: rgba(34,197,94,0.15); color: var(--success); }
    .slot-badge.over { background: rgba(239,68,68,0.15); color: var(--error); }
    
    /* Slots in header */
    .slots-compact {
      display: flex;
      justify-content: center;
      gap: 12px;
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 8px;
    }
    .slots-compact .slot-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .slots-compact .slot-label {
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .slots-compact .slot-value {
      font-weight: 700;
    }
    .slots-compact .slot-value.ok { color: var(--success); }
    .slots-compact .slot-value.over { color: var(--error); }
    .slots-compact .slot-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .slots-compact .slot-dot.hero { background: var(--role-hero); }
    .slots-compact .slot-dot.elite { background: var(--role-elite); }
    .slots-compact .slot-dot.core { background: var(--role-core); }
    .slots-compact .slot-dot.support { background: var(--role-support); }
    
    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 12px 0 16px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-text {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }
    
    /* Army Role Group */
    .army-role-group {
      margin-bottom: 16px;
      background:
        radial-gradient(circle at top right, rgba(var(--accent-rgb),0.08), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.01)),
        var(--panel);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      box-shadow: 0 14px 28px rgba(0,0,0,0.24);
    }
    .army-role-group:last-child { margin-bottom: 0; }
    .army-role-group.role-hero { border-left-color: var(--role-hero); }
    .army-role-group.role-elite { border-left-color: var(--role-elite); }
    .army-role-group.role-core { border-left-color: var(--role-core); }
    .army-role-group.role-support { border-left-color: var(--role-support); }
    .army-role-group.role-other { border-left-color: var(--role-other); }
    
    .army-role-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      cursor: pointer;
      user-select: none;
    }
    .army-role-group.expanded .army-role-header {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .army-role-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .army-role-header.role-hero .army-role-dot { background: var(--role-hero); }
    .army-role-header.role-elite .army-role-dot { background: var(--role-elite); }
    .army-role-header.role-core .army-role-dot { background: var(--role-core); }
    .army-role-header.role-support .army-role-dot { background: var(--role-support); }
    .army-role-header.role-other .army-role-dot { background: var(--role-other); }
    .army-role-name {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      flex: 1;
    }
    .army-role-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--panel-2);
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Army Card - Expandable */
    .army-card {
      background:
        radial-gradient(circle at top right, rgba(var(--accent-rgb),0.12), transparent 34%),
        linear-gradient(135deg, rgba(var(--accent-rgb),0.10) 0%, var(--panel-2) 22%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }
    .army-card:last-child { margin-bottom: 0; }
    .army-card.just-added {
      animation: scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    
    .army-card-header {
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background-color 0.16s ease;
    }
    .army-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(0,0,0,0.24);
    }
    .army-card-header:hover {
      background: rgba(255,255,255,0.03);
    }
    .army-card-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .army-card-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .army-card-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .army-card-cost {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--warning);
    }
    .army-card-chevron {
      color: var(--muted);
      font-size: 14px;
      transition: transform 0.2s;
    }
    .army-card.open .army-card-chevron {
      transform: rotate(90deg);
    }
    
    .army-card-body {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
      animation: revealBlock 0.2s ease;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      margin: 12px 0;
    }
    .stat-chip {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--panel-3);
      border-radius: 6px;
      padding: 6px 4px;
      text-align: center;
    }
    .stat-abbr {
      display: block;
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }
    .stat-value {
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    /* Weapon Table */
    .weapon-table {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--panel-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .weapon-table:last-child { margin-bottom: 0; }
    .weapon-table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .weapon-table-name {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .weapon-table-phase {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      text-transform: uppercase;
    }
    .weapon-table-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .weapon-table-row.alt {
      background: rgba(0,0,0,0.15);
    }
    .weapon-table-cell {
      padding: 6px 8px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .weapon-table-cell:last-child { border-right: none; }
    .weapon-table-cell span {
      display: block;
      font-size: 0.55rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }
    .weapon-table-cell strong {
      font-size: 0.8rem;
      font-weight: 600;
    }
    .weapon-table-keywords {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    /* Ability Block */
    .ability-block {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)), var(--panel-3);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .ability-block:last-child { margin-bottom: 0; }
    .ability-header {
      padding: 10px 12px 4px;
    }
    .ability-title {
      font-size: 0.88rem;
      font-weight: 600;
    }
    .ability-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .ability-body {
      padding: 0 12px 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    
    /* Keyword Highlight */
    .keyword {
      background: rgba(var(--accent-rgb),0.22);
      color: color-mix(in srgb, white 55%, var(--accent) 45%);
      padding: 1px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }
    .keyword:hover {
      background: rgba(var(--accent-rgb),0.34);
    }
    
    /* Section Block (collapsible) */
    .section-block {
      margin-top: 10px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      cursor: pointer;
      user-select: none;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .section-body {
      padding-top: 8px;
    }
    .chevron {
      color: var(--muted);
      font-size: 14px;
      transition: transform 0.2s;
    }
    .section-block.open .chevron {
      transform: rotate(90deg);
    }
    .section-block.open .section-body {
      animation: revealBlock 0.18s ease;
      transform-origin: top center;
    }
    
    /* Upgrade Toggle */
    .upgrade-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .upgrade-card.selected {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb),0.12);
    }
    .upgrade-card:last-child { margin-bottom: 0; }
    .upgrade-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
    }
    .upgrade-name {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .upgrade-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .upgrade-desc {
      padding: 0 12px 10px;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .upgrade-toggle {
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      transition: all 0.15s;
      flex-shrink: 0;
      position: relative;
      appearance: none;
      -webkit-appearance: none;
    }
    .upgrade-toggle.active {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    }
    
    /* Remove Button */
    .btn-remove {
      padding: 8px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: var(--error);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      width: 100%;
    }
    .btn-remove:hover {
      background: rgba(239,68,68,0.2);
    }
    
    /* Army Actions */
    .army-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .army-btn {
        flex: 1;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
      }
    .army-btn:hover {
        background: var(--panel-3);
      }
    .army-btn.primary {
        background: linear-gradient(135deg, rgba(var(--accent-rgb),0.28), rgba(var(--accent-rgb),0.18));
        border-color: rgba(var(--accent-rgb),0.58);
        color: white;
        box-shadow: 0 10px 24px rgba(var(--accent-rgb),0.18);
      }
    .army-btn.primary:hover {
        background: linear-gradient(135deg, rgba(var(--accent-rgb),0.38), rgba(var(--accent-rgb),0.24));
        border-color: rgba(var(--accent-rgb),0.74);
        box-shadow: 0 12px 28px rgba(var(--accent-rgb),0.24);
      }
    .army-btn.danger {
        background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(153,27,27,0.12));
        border-color: rgba(239,68,68,0.42);
        color: #fecaca;
      }
    .army-btn.scenario-clear-btn {
        flex: 0 0 auto;
        padding: 7px 10px;
        font-size: 0.72rem;
      border-radius: 8px;
      background: rgba(249,115,22,0.10);
      border-color: rgba(249,115,22,0.28);
      color: #f97316;
    }
    .army-btn.scenario-clear-btn:hover {
      background: rgba(249,115,22,0.16);
      border-color: rgba(249,115,22,0.40);
      color: var(--text);
    }
    .army-btn.danger:hover {
        background: linear-gradient(135deg, rgba(239,68,68,0.24), rgba(153,27,27,0.18));
        border-color: rgba(239,68,68,0.68);
        color: white;
        box-shadow: 0 10px 24px rgba(239,68,68,0.16);
      }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #555;
      font-size: 0.85rem;
    }
    
    /* Badge styles */
    .unique-badge {
      font-size: 0.55rem;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(245,158,11,0.2);
      color: #f59e0b;
      font-weight: 600;
      text-transform: uppercase;
    }
    .psionic-badge {
      font-size: 0.55rem;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(236,72,153,0.2);
      color: #ec4899;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    /* ========================================
       BOTTOM TAB BAR
    ======================================== */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 300;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1;
      padding: 6px 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .tab-btn .tab-icon {
      font-size: 1.1rem;
    }
    .tab-btn.active {
      color: var(--accent);
      background: rgba(var(--accent-rgb),0.14);
      box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb),0.22);
    }
    .tab-btn:not(.active):hover {
      color: var(--text);
      background: var(--panel-2);
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
      padding-bottom: 70px;
    }
    .tab-content.active {
      display: block;
      animation: tabFadeIn 0.18s ease;
    }
    .tab-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .tab-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    
    /* ========================================
       LIBRARY CARDS (Units, Tactical, Factions)
    ======================================== */
    .library-section {
      margin-bottom: 16px;
    }
    .library-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      margin-bottom: 8px;
    }
    .library-section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .library-section-dot.hero { background: var(--role-hero); }
    .library-section-dot.elite { background: var(--role-elite); }
    .library-section-dot.core { background: var(--role-core); }
    .library-section-dot.support { background: var(--role-support); }
    .library-section-dot.other { background: var(--role-other); }
    .library-section-name {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .unit-family-group {
      margin-bottom: 14px;
    }
    .unit-family-group:last-child {
      margin-bottom: 0;
    }
    .unit-family-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 2px 4px;
      margin: 2px 0 8px;
    }
    .unit-family-group .unit-card:last-child {
      margin-bottom: 0;
    }
    
    /* Unit Card in Library */
    .unit-card {
      background: linear-gradient(180deg, rgba(var(--accent-rgb),0.06) 0%, var(--panel) 18%, var(--panel) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      border-left: 3px solid var(--border);
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }
    .unit-card.role-hero { border-left-color: var(--role-hero); }
    .unit-card.role-elite { border-left-color: var(--role-elite); }
    .unit-card.role-core { border-left-color: var(--role-core); }
    .unit-card.role-support { border-left-color: var(--role-support); }
    .unit-card.role-other { border-left-color: var(--role-other); }
    .unit-card.in-army {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(var(--accent-rgb),0.16);
    }
    
    .unit-card-header {
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.16s ease;
      min-height: 104px;
      display: flex;
      flex-direction: column;
    }
    .unit-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .unit-card-header:hover {
      background: rgba(255,255,255,0.03);
    }
    .unit-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unit-name {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .unit-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
      font-size: 0.7rem;
      color: var(--muted);
      min-height: 28px;
      align-content: flex-start;
    }
    .unit-tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      cursor: pointer;
      line-height: 1.25;
    }
    .unit-tag:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .btn-add {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
      flex-shrink: 0;
    }
    .btn-add:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px rgba(147,51,234,0.5);
    }
    .btn-add:active {
      transform: scale(0.95);
    }
    .qty-controls {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.14s ease, filter 0.14s ease;
      display: inline-grid;
      place-items: center;
      padding: 0;
    }
    .qty-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 12px rgba(var(--accent-rgb),0.35);
    }
    .qty-btn:active {
      transform: scale(0.95);
    }
    .qty-btn:disabled {
      opacity: 0.35;
      cursor: default;
      box-shadow: none;
      transform: none;
    }
    .qty-count {
      min-width: 24px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }
    
    .unit-card-body {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
      animation: revealBlock 0.2s ease;
    }
    
    /* Tier Table */
    .tier-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin: 12px 0;
    }
    .tier-table th {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
    }
    .tier-table td {
      text-align: center;
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }
    .tier-table tr:last-child td {
      border-bottom: none;
    }
    
    /* Tactical Card */
    .tactical-card {
      background: linear-gradient(180deg, rgba(var(--accent-rgb),0.05) 0%, var(--panel) 18%, var(--panel) 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      border-left: 3px solid var(--tactical);
    }
    .tactical-card.in-army {
      border-color: var(--gas);
    }
    .tactical-header {
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      min-height: 104px;
      display: flex;
      flex-direction: column;
    }
    .tactical-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tactical-name {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tactical-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tactical-cost {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--gas);
    }
    .tactical-summary {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      font-style: italic;
      min-height: 1.2em;
    }
    .tactical-info {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      min-height: 28px;
      align-content: flex-start;
    }
    .tactical-pill {
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      line-height: 1.25;
    }
    .tactical-category-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      margin: 14px 0 10px;
    }
    .tactical-category-header:first-child {
      margin-top: 0;
    }
    .tactical-category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--tactical);
      flex-shrink: 0;
    }
    .tactical-category-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tactical-category-desc {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .tactical-body {
      padding: 12px 16px 16px;
      border-top: 1px solid var(--border);
    }
    
    /* Faction Card */
    .faction-card {
      background: linear-gradient(180deg, rgba(var(--accent-rgb),0.08) 0%, var(--panel) 22%, var(--panel) 100%);
      border: 1px solid var(--accent);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .faction-card:not(.selected) {
      border-color: var(--border);
      opacity: 0.8;
    }
    .faction-card-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      min-height: 78px;
    }
    .faction-radio {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--muted);
      background: transparent;
      color: transparent;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .faction-radio.selected {
      border-color: var(--success);
      background: var(--success);
      color: var(--bg);
    }
    .faction-radio:not(.selected):active {
      border-color: var(--accent);
    }
    .faction-card-main {
      flex: 1;
      cursor: pointer;
    }
    .faction-card-top {
      display: flex;
      align-items: center;
    }
    .faction-card-name {
      font-size: 1.05rem;
      font-weight: 700;
    }
    .faction-card-chevron {
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
    }
    .faction-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .faction-card-resource {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(147,51,234,0.2);
      color: var(--accent);
    }
    .faction-card-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 19px 16px 10px;
      background: var(--bg);
      justify-content: center;
      min-height: 52px;
      align-content: flex-start;
    }
    .faction-slot-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      line-height: 1.25;
    }
    .faction-slot-badge.hero { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .faction-slot-badge.elite { background: rgba(168,85,247,0.15); color: #a855f7; }
    .faction-slot-badge.core { background: rgba(59,130,246,0.15); color: #3b82f6; }
    .faction-slot-badge.support { background: rgba(34,197,94,0.15); color: #22c55e; }
    .faction-card-abilities {
      padding: 12px 16px;
    }
    
    /* Glossary */
    .glossary-search {
      margin-bottom: 16px;
    }
    .glossary-search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .glossary-search-input:focus {
      border-color: var(--accent);
    }
    .glossary-search-input::placeholder {
      color: var(--muted);
    }
    .glossary-section-header {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding: 8px 4px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .glossary-entry {
      border-left: 3px solid var(--glossary);
    }
    .glossary-entry.tag-entry {
      border-left-color: var(--accent);
    }
    
    /* ========================================
       MODALS
    ======================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: grid;
      place-items: center;
      z-index: 200;
      padding: 20px;
      animation: fadeIn 0.15s;
      backdrop-filter: blur(3px);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 380px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.2s;
      box-shadow: 0 22px 48px rgba(0,0,0,0.36);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .modal-type {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 0.14s ease, background-color 0.14s ease, color 0.14s ease;
    }
    .modal-close:hover {
      transform: rotate(90deg) scale(1.04);
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }
    .modal-body {
      padding: 16px;
    }
    .keyword-detail {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .glossary-block {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,.02);
      padding: 12px 14px;
    }
    .glossary-block.raw {
      border-color: rgba(var(--accent-rgb), .22);
      background: rgba(var(--accent-rgb), .08);
    }
    .glossary-block-label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      color: #f8fafc;
    }
    .glossary-block.raw .glossary-block-label {
      color: color-mix(in srgb, white 40%, var(--accent) 60%);
    }
    .glossary-block-text {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .glossary-block-text p + p {
      margin-top: 8px;
    }
    .glossary-example {
      color: #fef3c7;
    }
    @keyframes revealBlock {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes tabFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
    .tier-option {
      padding: 14px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tier-option:hover {
      border-color: var(--accent);
    }
    .tier-option-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tier-option-models {
      font-weight: 600;
    }
    .tier-option-cost {
      color: var(--warning);
      font-weight: 600;
    }
    .tier-option-supply {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }
    
    .export-choice-btn {
      width: 100%;
      padding: 14px 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      margin-bottom: 10px;
    }
    .export-choice-btn:last-child { margin-bottom: 0; }
    .export-choice-btn:hover {
      border-color: var(--accent);
      background: rgba(147,51,234,0.1);
    }
    .export-choice-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .export-choice-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }
    .package-section {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    .package-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      padding: 14px;
      display: grid;
      gap: 10px;
    }
    .package-card + .package-card {
      margin-top: 12px;
    }
    .package-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .package-card-title {
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--text);
    }
    .package-card-meta {
      font-size: 0.78rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .package-card-summary {
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.5;
    }
    .package-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .scenario-stack {
      display: grid;
      gap: 12px;
    }
    .scenario-panel {
      border: 1px solid rgba(249,115,22,0.22);
      background:
        linear-gradient(180deg, rgba(249,115,22,0.08) 0%, rgba(15,23,42,0.42) 28%, rgba(15,23,42,0.24) 100%);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }
    .scenario-panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .scenario-panel-title {
      font-size: 0.96rem;
      font-weight: 800;
      color: #fff4e6;
      letter-spacing: 0.01em;
    }
    .scenario-panel-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .scenario-meta-pill {
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(249,115,22,0.20);
      background: rgba(249,115,22,0.10);
      color: #ffd7b0;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
    }
    .scenario-card-note {
      font-size: 0.82rem;
      color: #d9cabd;
      line-height: 1.55;
      max-width: 62ch;
    }
    .scenario-pick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .scenario-option {
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(249,115,22,0.16);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      text-align: left;
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.35;
      transition: border-color .18s ease, background .18s ease, transform .18s ease, color .18s ease;
    }
    .scenario-option:hover {
      border-color: rgba(249,115,22,0.34);
      background: rgba(249,115,22,0.10);
      transform: translateY(-1px);
    }
    .scenario-option.active {
      border-color: rgba(249,115,22,0.58);
      background: rgba(249,115,22,0.18);
      color: #fff4e6;
      box-shadow: inset 0 0 0 1px rgba(249,115,22,0.32);
    }
    .scenario-toggle-summary {
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .package-chip {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.24);
      font-size: 0.72rem;
      color: #d8deff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .package-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
      display: grid;

<body>
  <div class="app" id="app"></div>
  
  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar"></div>

  <script src="./runtime/payloads/unit-upgrade-cost-overrides.js"></script>
  <script src="./runtime/payloads/advice-packages.js"></script>
  <script src="./runtime/payloads/mission-setup.js"></script>
  <script src="./runtime/payloads/army-sheet-export.js"></script>
  <script src="./runtime/payloads/glossary-reference.js"></script>
  <script src="./runtime/payloads/glossary-renderer.js"></script>
  <script src="./runtime/payloads/zerg.js"></script>

  <script>
    // ============================================================================
    // DATA: Keywords Glossary
    // ============================================================================
    const KEYWORDS = {
      'ANTI-EVADE': { type: 'Combat', description: 'The target suffers -X to its Evade Rolls for this attack.' },
      'BUFF': { type: 'Effect', description: 'The Unit gains a bonus of X to the specified Characteristic until End of the Round.' },
      'BURROWED': { type: 'Status', description: 'The unit becomes HIDDEN and counts as Size 0. For Disengage checks it counts as Supply 0. It cannot contest or control Mission Markers. It gets an Evade Roll against every attack.' },
      'CRITICAL HIT': { type: 'Combat', description: 'Move X dice directly from the Armour Pool to the Damage Pool, bypassing armour.' },
      'DEBUFF': { type: 'Effect', description: 'The Unit suffers a penalty of X to the specified Characteristic until End of the Round.' },
      'DISPLACEMENT': { type: 'Movement', description: 'This model/token can be moved through by other models and does not block movement.' },
      'FLYING': { type: 'Status', description: 'Flying units ignore terrain when moving, are never Engaged, cannot Charge or be Charged, and cannot contest or control Mission Markers.' },
      'HEAL': { type: 'Effect', description: 'Remove X points of accumulated Damage from the Unit. HEAL cannot return Destroyed models.' },
      'HIDDEN': { type: 'Status', description: 'Enemies more than 4" away cannot target this unit with ranged attacks or Line of Sight abilities. The unit is immune to IMPACT and gets an Evade Roll against every attack.' },
      'IMPACT': { type: 'Combat', description: 'After a successful Charge, each eligible model generates X extra dice. Rolls of Y or higher become automatic hits placed in the Armour Pool.' },
      'INSTANT': { type: 'Weapon', description: 'This weapon resolves immediately, typically granting the INSTANT keyword to close combat weapons for the active unit.' },
      'LONG RANGE': { type: 'Weapon', description: "The weapon's maximum range extends to X inches, but shots beyond the normal listed range suffer a -1 Hit penalty." },
      'ON CREEP': { type: 'Zerg', description: 'A Ground Zerg Unit is ON CREEP while Within 6" of any Creep Tumor Token or Source of Creep (like Omega Worm).' },
      'PLACE': { type: 'Movement', description: 'Remove the Leading Model and set it Wholly Within X inches of its starting point. PLACE ignores normal pathing, gap clearance, terrain restrictions, and elevation requirements, then the unit is rebuilt in Coherency.' },
      'PRECISION': { type: 'Combat', description: 'After rolling to hit, move up to X missed dice into the Armour Pool. They still need to survive armour.' },
      'RESPAWN': { type: 'Effect', description: 'Return up to X Destroyed models to the Unit. Cannot increase the Unit into a higher Supply bracket.' },
      'SHIELDED': { type: 'Status', description: 'The first model in the unit gets extra Hit Points equal to its Shield value. The status ends when that shield is broken or the first model is removed.' },
      'STATIONARY': { type: 'Status', description: 'All units start each round Stationary. The status is lost the moment the unit moves, is moved, or is placed.' },
      'STAY IN PLAY': { type: 'Other', description: 'This token or marker persists through cleanup instead of being removed at the end of the round.' },
      'SUMMON': { type: 'Movement', description: 'Create the named unit adjacent to the parent unit. It must be placed legally, with enough Available Supply, and usually gains an Activation Marker.' },
      'TOUGH': { type: 'Combat', description: 'When making Armour Rolls, convert up to X failed results into successes.' },
    };

    const TAGS = {
      'Armoured': { type: 'Combat Tag', description: 'Used for targeting and surge interactions. Weapons with Surge Type: Armoured deal bonus damage that bypasses armour when attacking this unit.' },
      'Biological': { type: 'Combat Tag', description: 'Used for targeting and surge interactions. Weapons with Surge Type: Biological deal bonus damage that bypasses armour when attacking this unit.' },
      'Flying': { type: 'Combat Tag', description: 'Flying units are never Engaged and cannot Engage. They cannot Charge or be Charged. They ignore terrain and Gap Clearance during movement. They do not participate in the Combat Phase. They cannot Contest or Control Mission Markers. They never benefit from High Ground Cover. Must end movement at least 1" from enemy Flying units.' },
      'Ground': { type: 'Combat Tag', description: 'Ground units can Engage other Ground units when Within 1". Weapons with Target: Ground can only hit units with this tag. Ground units participate in the Combat Phase when Engaged.' },
      'Light': { type: 'Combat Tag', description: 'Used for targeting and surge interactions. Weapons with Surge Type: Light deal bonus damage that bypasses armour when attacking this unit.' },
      'Mechanical': { type: 'Combat Tag', description: 'Used for targeting and surge interactions. Weapons with Surge Type: Mechanical deal bonus damage that bypasses armour when attacking this unit.' },
      'Psionic': { type: 'Special Tag', description: 'This unit has psychic abilities. Used as a marker for ability targeting - certain abilities specifically affect or reference Psionic units. Does not affect Surge damage.' },
      'Unique': { type: 'Special Tag', description: 'Only one of this unit may be included in your army list.' },
    };

    const SURGE_TAGS = ['Armoured', 'Biological', 'Light', 'Mechanical'];
    const TYPE_TAGS = ['Ground', 'Flying'];

    // ============================================================================
    // DATA: Engagement Scales
    // ============================================================================
    const ENGAGEMENT_SCALES = [
      { id: 'skirmish', name: 'Skirmish', minerals: 1000, gas: 100, table: '36" x 36"' },
      { id: 'standard', name: 'Standard', minerals: 2000, gas: 200, table: '36" x 54"' },
      { id: 'grand', name: 'Grand', minerals: 9999, gas: 999, table: '36" x 72"' },
    ];

    const GLOSSARY_REFERENCE = Array.isArray(window.__glossaryReference) ? window.__glossaryReference : [];
    const BUILDER_GLOSSARY = window.__glossaryRenderer?.createBuilderGlossary({
      glossaryReference: GLOSSARY_REFERENCE,
      keywords: KEYWORDS,
      tags: TAGS
    });
    const runtimePayload = window.__starcraftTMGRuntimePayload;
    const UPGRADE_COST_OVERRIDES = window.__unitUpgradeCostOverrides || {};
    const ADVICE_PACKAGE_DATA = window.__armyBuilderAdviceData || { factionNotes: [], packages: [] };
    const MISSION_SETUP_DATA = window.__missionSetupData || { missions: [], maps: [] };
    const ARMY_SHEET_EXPORT = window.__armySheetExport || null;
    const ZERG_FACTION_CARDS = Array.isArray(runtimePayload?.factionCards) ? runtimePayload.factionCards : [];
    const ZERG_UNITS = Array.isArray(runtimePayload?.units) ? runtimePayload.units : [];
    const ZERG_TACTICAL_CARDS = Array.isArray(runtimePayload?.tacticalCards) ? runtimePayload.tacticalCards : [];
    window.__starcraftTMGRuntimeStatus = runtimePayload?.status || 'missing-runtime-payload';

    // ============================================================================
    // STATE
    // ============================================================================
    let state = {
      selectedScale: ENGAGEMENT_SCALES[1],
      selectedFaction: ZERG_FACTION_CARDS[0],
      armyUnits: [],
      armyTactical: [],
      activeTab: 'factions', // 'factions', 'units', 'tactical', 'army', 'glossary'
      expandedArmyCards: {},
      expandedRoleGroups: {}, // Track which role groups are expanded
      expandedLibraryCards: {},
      openSections: {},
      keywordModal: null,
      tierPicker: null,
      showExportChoice: false,
      showClearConfirm: false,
      exportText: null,
      justAddedId: null,
      glossarySearch: '',
      selectedMissionId: null,
      selectedMapId: null,
    };

    // ============================================================================
    // HELPERS
    // ============================================================================
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function highlightKeywords(text) {
      return BUILDER_GLOSSARY?.highlight(text) || String(text ?? '');
    }

    function normalizeLookupKey(value) {
      return window.__glossaryRenderer?.normalizeLookupKey(value) || '';
    }

    function getPaidTiers(unit) {
      return (unit?.tiers || [])
        .filter(tier => tier && tier.cost !== null)
        .sort((a, b) => (Number(a.supply) || 0) - (Number(b.supply) || 0));
    }

    function getDefaultTier(unit) {
      const allTiers = (unit?.tiers || []).filter(Boolean);
      if (allTiers.length === 0) return null;
      const paidTiers = getPaidTiers(unit);
      if (paidTiers.length > 0) return paidTiers[0];
      return [...allTiers].sort((a, b) => (Number(a.supply) || 0) - (Number(b.supply) || 0))[0];
    }

    function getTierSizeLabel(unit, tier) {
      const paidTiers = getPaidTiers(unit);
      if (paidTiers.length === 0 || !tier) return null;
      if (paidTiers.length === 1) return 'small';

      const index = paidTiers.findIndex(candidate =>
        candidate.tier === tier.tier
        && String(candidate.models) === String(tier.models)
        && Number(candidate.supply) === Number(tier.supply)
      );

      if (index === -1) return null;
      if (paidTiers.length === 2) return index === 0 ? 'small' : 'large';
      if (index === 0) return 'small';
      if (index === paidTiers.length - 1) return 'large';
      return 'medium';
    }

    function getUpgradeOverride(unit, tier, upgrade) {
      const unitKey = normalizeLookupKey(unit?.name);
      const sizeKey = getTierSizeLabel(unit, tier);
      const upgradeKey = normalizeLookupKey(upgrade?.name);
      return sizeKey ? UPGRADE_COST_OVERRIDES[unitKey]?.sizes?.[sizeKey]?.upgrades?.[upgradeKey] || null : null;
    }

    function getResolvedUpgradeCostValue(unit, tier, upgrade) {
      const override = getUpgradeOverride(unit, tier, upgrade);
      if (override?.cost != null) return override.cost;

      const rawCost = upgrade?.cost;
      if (typeof rawCost === 'number') return rawCost;
      if (typeof rawCost === 'string' && rawCost.includes('/')) {
        const values = rawCost.split('/').map(value => parseInt(value, 10)).filter(Number.isFinite);
        if (values.length === 0) return 0;
        const sizeKey = getTierSizeLabel(unit, tier);
        return sizeKey === 'large' && values.length > 1 ? values[values.length - 1] : values[0];
      }

      const parsed = parseInt(rawCost, 10);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function getResolvedUpgradeCostLabel(unit, tier, upgrade) {
      const override = getUpgradeOverride(unit, tier, upgrade);
      if (override?.cost != null) return String(override.cost);

      const rawCost = upgrade?.cost;
      if (typeof rawCost === 'string' && rawCost.includes('/')) return String(getResolvedUpgradeCostValue(unit, tier, upgrade));
      return String(rawCost ?? 0);
    }

    function getLibraryUpgradeCostLabel(unit, upgrade) {
      const unitKey = normalizeLookupKey(unit?.name);
      const upgradeKey = normalizeLookupKey(upgrade?.name);
      const unitOverrides = UPGRADE_COST_OVERRIDES[unitKey]?.sizes || null;

      if (unitOverrides) {
        const sizeCosts = ['small', 'large']
          .map(sizeKey => unitOverrides[sizeKey]?.upgrades?.[upgradeKey]?.cost)
          .filter(cost => cost != null);

        if (sizeCosts.length === 1) return String(sizeCosts[0]);
        if (sizeCosts.length > 1) {
          const uniqueCosts = [...new Set(sizeCosts.map(cost => String(cost)))];
          return uniqueCosts.length === 1 ? uniqueCosts[0] : uniqueCosts.join('/');
        }
      }

      return getResolvedUpgradeCostLabel(unit, null, upgrade);
    }

    function findByNormalizedName(collection, name) {
      const target = normalizeLookupKey(name);
      return (collection || []).find(item => normalizeLookupKey(item?.name) === target) || null;
    }

    function findById(collection, id) {
      return (collection || []).find(item => item?.id === id) || null;
    }

    function resolveByIdOrName(collection, id, name) {
      return (id ? findById(collection, id) : null) || (name ? findByNormalizedName(collection, name) : null) || null;
    }

    function getFlattenedUnitUpgrades(unit) {
      const upgrades = unit?.upgrades;
      if (!upgrades) return [];
      if (Array.isArray(upgrades)) {
        return upgrades.flatMap(group => Array.isArray(group?.options) ? group.options : []);
      }
      if (typeof upgrades === 'object') {
        return Object.values(upgrades).flatMap(group =>
          Array.isArray(group)
            ? group
            : Array.isArray(group?.options)
              ? group.options
              : []
        );
      }
      return [];
    }

    function getAdvicePackagesForCurrentSelection() {
      const factionId = state.selectedFaction?.id;
      const factionName = state.selectedFaction?.name;
      const scaleId = state.selectedScale?.id;
      return (ADVICE_PACKAGE_DATA.packages || []).filter(pkg =>
        pkg.scaleId === scaleId && (pkg.factionId === factionId || pkg.factionName === factionName)
      );
    }

    function getFactionAdviceNotes() {
      const factionId = state.selectedFaction?.id;
      const factionName = state.selectedFaction?.name;
      return (ADVICE_PACKAGE_DATA.factionNotes || []).filter(note => note.factionId === factionId || note.factionName === factionName);
    }

    function flattenPhaseAbilities(phaseAbilities) {
      if (!phaseAbilities) return [];
      if (Array.isArray(phaseAbilities)) return phaseAbilities;
      return Object.entries(phaseAbilities).flatMap(([phase, abilities]) =>
        (abilities || []).map(ability => ({ ...ability, phase: ability.phase || phase }))
      );
    }

    function getScenarioScaleType() {
      return state.selectedScale?.id === 'skirmish' ? 'Skirmish' : 'Standard';
    }

    function getActiveMissions() {
      const type = getScenarioScaleType();
      return (MISSION_SETUP_DATA.missions || []).filter(mission => mission.type === type);
    }

    function getActiveMaps() {
      const type = getScenarioScaleType();
      return (MISSION_SETUP_DATA.maps || []).filter(map => map.type === type);
    }

    function getSelectedMission() {
      return getActiveMissions().find(mission => mission.id === state.selectedMissionId) || null;
    }

    function getSelectedMap() {
      return getActiveMaps().find(map => map.id === state.selectedMapId) || null;
    }

    function getTotals() {
      const minerals = state.armyUnits.reduce((sum, u) => {
        const upgCost = (u.selectedUpgrades || []).reduce((us, upg) => us + getResolvedUpgradeCostValue(u.unit, u.tier, upg), 0);
        return sum + u.cost + upgCost;
      }, 0);
      const gas = state.armyTactical.reduce((sum, t) => sum + t.cost, 0);
      const supply = state.armyUnits.reduce((sum, u) => sum + u.tier.supply, 0);
      const scale = state.selectedScale;
      return {
        minerals,
        gas,
        supply,
        mineralsLeft: scale.id === 'grand' ? 'inf' : scale.minerals - minerals,
        gasLeft: scale.id === 'grand' ? 'inf' : scale.gas - gas,
        mineralsOver: scale.id !== 'grand' && minerals > scale.minerals,
        gasOver: scale.id !== 'grand' && gas > scale.gas
      };
    }

    function getSlots() {
      const baseSlots = state.selectedFaction?.slots || {};
      const tacticalSlots = state.armyTactical.reduce((acc, t) => {
        Object.entries(t.slots || {}).forEach(([slot, count]) => {
          acc[slot] = (acc[slot] || 0) + count;
        });
        return acc;
      }, {});
      // Start with base slots from faction, then add tactical slots
      const totalSlots = { ...baseSlots };
      Object.entries(tacticalSlots).forEach(([slot, count]) => {
        totalSlots[slot] = (totalSlots[slot] || 0) + count;
      });
      // Calculate used slots
      const used = { hero: 0, elite: 0, core: 0, support: 0 };
      state.armyUnits.forEach(u => {
        const role = u.unit.role.toLowerCase();
        if (used[role] !== undefined) used[role] += u.tier.supply || 1;
      });
      return { total: totalSlots, used };
    }

    function save() {
      try {
        const toSave = {
          units: state.armyUnits.map(entry => ({
            unitId: entry.unit.id,
            tier: entry.tier,
            cost: entry.cost,
            selectedUpgrades: entry.selectedUpgrades || []
          })),
          tactical: state.armyTactical.map(t => t.id),
          factionId: state.selectedFaction?.id,
          scaleId: state.selectedScale?.id,
          missionId: state.selectedMissionId,
          mapId: state.selectedMapId
        };
        localStorage.setItem('sc-tmg-zerg-v4', JSON.stringify(toSave));
      } catch (e) { console.error(e); }
    }



    function getCompanionFactionKey() {
      const path = window.location.pathname.toLowerCase();
      if (path.includes('terran')) return 'terran';
      if (path.includes('protoss')) return 'protoss';
      return 'zerg';
    }

    function importToCompanion(player) {
      save();
      const targetPlayer = player === 'p2' ? 'p2' : 'p1';
      const faction = getCompanionFactionKey();
      window.location.href = '../index.html?import=' + encodeURIComponent(faction) + '&player=' + encodeURIComponent(targetPlayer);
    }

    function load() {
      try {
        const saved = localStorage.getItem('sc-tmg-zerg-v4');
        if (saved) {
          const { units, tactical, factionId, scaleId, missionId, mapId } = JSON.parse(saved);
          const rehydratedUnits = (units || []).map(entry => {
            const unit = ZERG_UNITS.find(u => u.id === entry.unitId);
            if (!unit) return null;
            return { unit, tier: entry.tier, cost: entry.cost, selectedUpgrades: entry.selectedUpgrades || [] };
          }).filter(Boolean);
          const rehydratedTactical = (tactical || []).map(id => ZERG_TACTICAL_CARDS.find(t => t.id === id)).filter(Boolean);
          state.armyUnits = rehydratedUnits;
          state.armyTactical = rehydratedTactical;
          const faction = ZERG_FACTION_CARDS.find(f => f.id === factionId);
          if (faction) state.selectedFaction = faction;
          const scale = ENGAGEMENT_SCALES.find(s => s.id === scaleId);
          if (scale) state.selectedScale = scale;
          state.selectedMissionId = missionId || null;
          state.selectedMapId = mapId || null;
        }
      } catch (e) { console.error(e); }
    }

    // ============================================================================
    // ACTIONS
    // ============================================================================
    function selectScale(scaleId) {
      state.selectedScale = ENGAGEMENT_SCALES.find(s => s.id === scaleId);
      if (!getActiveMissions().some(mission => mission.id === state.selectedMissionId)) {
        state.selectedMissionId = null;
      }
      if (!getActiveMaps().some(map => map.id === state.selectedMapId)) {
        state.selectedMapId = null;
      }
      save();
      render();
    }

    function selectFaction(factionId) {
      state.selectedFaction = ZERG_FACTION_CARDS.find(f => f.id === factionId);
      save();
      render();
    }

    function loadAdvicePackage(packageId) {
      const pkg = (ADVICE_PACKAGE_DATA.packages || []).find(candidate => candidate.id === packageId);
      if (!pkg) return;

      if ((state.armyUnits.length > 0 || state.armyTactical.length > 0) && !window.confirm('Replace the current roster with this package?')) {
        return;
      }

      const faction = resolveByIdOrName(ZERG_FACTION_CARDS, pkg.factionId, pkg.factionName);
      if (faction) state.selectedFaction = faction;

      const scale = ENGAGEMENT_SCALES.find(candidate => candidate.id === pkg.scaleId);
      if (scale) state.selectedScale = scale;

      const missing = [];
      const loadedUnits = [];
      const loadedTactical = [];

      const tacticalRefs = Array.from({ length: Math.max((pkg.tacticalCardIds || []).length, (pkg.tacticalCards || []).length) }, (_, index) => ({
        id: pkg.tacticalCardIds?.[index] || null,
        name: pkg.tacticalCards?.[index] || null
      }));

      tacticalRefs.forEach(({ id, name }) => {
        const card = resolveByIdOrName(ZERG_TACTICAL_CARDS, id, name);
        if (card) {
          loadedTactical.push(card);
        } else {
          missing.push('Tactical: ' + (name || id));
        }
      });

      (pkg.units || []).forEach((unitConfig, index) => {
        const unit = resolveByIdOrName(ZERG_UNITS, unitConfig.unitId, unitConfig.name);
        if (!unit) {
          missing.push('Unit: ' + (unitConfig.name || unitConfig.unitId));
          return;
        }

        const tiers = getPaidTiers(unit);
        let tier = null;
        if (unitConfig.models != null) {
          tier = tiers.find(candidate => String(candidate.models) === String(unitConfig.models)) || null;
        }
        if (!tier) {
          tier = getDefaultTier(unit);
        }
        if (!tier) {
          missing.push('Tier: ' + unitConfig.name);
          return;
        }

        const upgradeRefs = Array.from({ length: Math.max((unitConfig.upgradeIds || []).length, (unitConfig.upgrades || []).length) }, (_, upgradeIndex) => ({
          id: unitConfig.upgradeIds?.[upgradeIndex] || null,
          name: unitConfig.upgrades?.[upgradeIndex] || null
        }));

        const selectedUpgrades = upgradeRefs.map(({ id, name }) => {
          const option = resolveByIdOrName(getFlattenedUnitUpgrades(unit), id, name);
          if (!option) {
            missing.push('Upgrade: ' + (unitConfig.name || unitConfig.unitId) + ' -> ' + (name || id));
          }
          return option;
        }).filter(Boolean);

        loadedUnits.push({
          unit,
          tier,
          cost: tier.cost ?? 0,
          selectedUpgrades,
          entryId: Date.now() + index
        });
      });

      state.armyUnits = loadedUnits;
      state.armyTactical = loadedTactical;
      state.activeTab = 'army';
      save();
      render();

      if (missing.length > 0) {
        window.alert('Package loaded with some missing items:\n\n' + missing.join('\n'));
      }
    }

    function selectMission(missionId) {
      state.selectedMissionId = missionId ? (state.selectedMissionId === missionId ? null : missionId) : null;
      save();
      render();
    }

    function selectMap(mapId) {

    function randomMission() {

      if (missions.length === 0) return;
      const pool = missions.filter(mission => mission.id !== state.selectedMissionId);
      const source = pool.length ? pool : missions;
      const pick = source[Math.floor(Math.random() * source.length)];
      state.selectedMissionId = pick?.id || null;
      save();
      render();

    function randomMap() {
      const maps = getActiveMaps();
      if (maps.length === 0) return;
      const pool = maps.filter(map => map.id !== state.selectedMapId);
      const source = pool.length ? pool : maps;
      const pick = source[Math.floor(Math.random() * source.length)];
      state.selectedMapId = pick?.id || null;
      save();

    function toggleRoleGroup(role) {

    function getUnitFamilyName(unitOrName) {
      const family = typeof unitOrName === 'object' && unitOrName ? unitOrName.family : null;
      if (family) return String(family).trim();
      const name = typeof unitOrName === 'string' ? unitOrName : (unitOrName?.name || '');
      const trimmedName = String(name).trim();
      const match = trimmedName.match(/\(([^()]+)\)\s*$/);
      return (match ? match[1] : trimmedName).trim();
    }

    function isBaseFamilyUnit(unit) {
      if (Number.isFinite(Number(unit?.variantOrder))) return Number(unit.variantOrder) === 0;
      return unit.name.trim().toLowerCase() === getUnitFamilyName(unit).toLowerCase();
    }

    function groupUnitsByFamily(units) {
      const sortedUnits = [...units].sort((a, b) => {
        const familyCompare = getUnitFamilyName(a).localeCompare(getUnitFamilyName(b));
        if (familyCompare !== 0) return familyCompare;

        const variantOrderA = Number.isFinite(Number(a?.variantOrder)) ? Number(a.variantOrder) : (isBaseFamilyUnit(a) ? 0 : 1);
        const variantOrderB = Number.isFinite(Number(b?.variantOrder)) ? Number(b.variantOrder) : (isBaseFamilyUnit(b) ? 0 : 1);
        if (variantOrderA !== variantOrderB) {
          return variantOrderA - variantOrderB;
        }

        return a.name.localeCompare(b.name);
      });

      const groups = [];
      sortedUnits.forEach(unit => {
        const family = getUnitFamilyName(unit);
        const lastGroup = groups[groups.length - 1];
        if (!lastGroup || lastGroup.family !== family) {
          groups.push({ family, units: [unit] });
        } else {
          lastGroup.units.push(unit);
        }
      });
      return groups;
    }

    function toggleLibraryCard(cardId) {
      state.expandedLibraryCards[cardId] = !state.expandedLibraryCards[cardId];
      render();
    }

    function toggleSection(sectionId) {

    }

    function toggleUpgrade(entryId, upgrade) {
      state.armyUnits = state.armyUnits.map(entry => {
        if (entry.entryId !== entryId) return entry;
        const isSelected = (entry.selectedUpgrades || []).some(u => u.name === upgrade.name);
        return {
          ...entry,
          selectedUpgrades: isSelected
            ? entry.selectedUpgrades.filter(u => u.name !== upgrade.name)
            : [...(entry.selectedUpgrades || []), upgrade]
        };
      });
      save();
      render();
    }

    function slugifyFilenamePart(value) {
      return String(value || 'army')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'army';
    }

    function triggerDownload(filename, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function buildExportText(mode) {
      const lines = [];
      const totals = getTotals();
      const slots = getSlots();
      const divider = '='.repeat(50);
      const thinDivider = '-'.repeat(50);

      lines.push(divider);
      lines.push('  ' + (state.selectedFaction?.name?.toUpperCase() || 'ARMY') + ' - ' + state.selectedScale.name);
      lines.push(divider);
      lines.push('');

      lines.push('FACTION: ' + state.selectedFaction?.name + ' (' + state.selectedFaction?.resource + ')');
      const slotStr = Object.entries(state.selectedFaction?.slots || {}).map(([s, c]) => s.charAt(0).toUpperCase() + c).join(' / ');
      lines.push('  Slots: ' + slotStr);
      lines.push('');

      if (state.armyTactical.length > 0) {
        lines.push('TACTICAL CARDS');
        lines.push(thinDivider);
        state.armyTactical.forEach(t => {
          lines.push(t.name + (t.unique ? ' [U]' : '') + ' - ' + t.cost + ' Gas');
        });
        lines.push('');
      }

      if (state.armyUnits.length > 0) {
        lines.push('UNITS');
        lines.push(thinDivider);
        ['Hero', 'Elite', 'Core', 'Support', 'Other'].forEach(role => {
          const unitsInRole = state.armyUnits.filter(e => e.unit.role === role);
          if (unitsInRole.length === 0) return;
          lines.push('> ' + role.toUpperCase());
          unitsInRole.forEach(entry => {
            const upgCost = (entry.selectedUpgrades || []).reduce((sum, u) => sum + getResolvedUpgradeCostValue(entry.unit, entry.tier, u), 0);
            const total = entry.cost + upgCost;
            lines.push('  ' + entry.unit.name + ' x' + entry.tier.models + ' - ' + total + ' pts (Supply ' + entry.tier.supply + ')');
            (entry.selectedUpgrades || []).forEach(upg => {
              lines.push('    + ' + upg.name + ' (+' + getResolvedUpgradeCostLabel(entry.unit, entry.tier, upg) + ')');
            });
            if (mode === 'full') {
              if (entry.unit.tags && entry.unit.tags.length) lines.push('    Tags: ' + entry.unit.tags.join(', '));
              if (entry.tier?.characteristics) {
                const c = entry.tier.characteristics;
                const stats = [
                  ['M', c.move], ['EVA', c.evade], ['ARM', c.armor], ['HP', c.hp], ['SH', c.shields], ['SUP', c.supply]
                ].filter(([,v]) => v !== undefined && v !== null && v !== '');
                if (stats.length) lines.push('    Stats: ' + stats.map(([k,v]) => k + ' ' + v).join(' | '));
              }
              (entry.unit.weapons || []).forEach(w => {
                const parts = [];
                if (w.range) parts.push('Range ' + w.range);
                if (w.attack) parts.push('Atk ' + w.attack);
                if (w.hit) parts.push('Hit ' + w.hit);
                if (w.damage) parts.push('Dmg ' + w.damage);
                if (w.target) parts.push('Target ' + w.target);
                if (w.special) parts.push(w.special);
                lines.push('    Weapon: ' + w.name + (parts.length ? ' — ' + parts.join(', ') : ''));
              });
              (entry.unit.abilities || []).forEach(ab => {
                const head = [ab.phase, ab.name, ab.type].filter(Boolean).join(' | ');
                lines.push('    Ability: ' + head + (ab.text ? ' — ' + ab.text : ''));
              });
            }
          });
          lines.push('');
        });
      }

      lines.push(divider);
      lines.push('  ' + totals.minerals + '/' + state.selectedScale.minerals + ' Mins - ' + totals.gas + '/' + state.selectedScale.gas + ' Gas - Supply ' + totals.supply);
      lines.push(divider);

      return lines.join('\n');
    }

    function doExport(mode) {
      state.exportText = buildExportText(mode);
      state.showExportChoice = false;
      render();
    }

    function downloadTextExport(mode) {
      const factionName = state.selectedFaction?.name || 'army';
      const scaleName = state.selectedScale?.name || 'list';
      const filename = slugifyFilenamePart(factionName) + '-' + slugifyFilenamePart(scaleName) + '-' + mode + '-reference.txt';
      triggerDownload(filename, buildExportText(mode), 'text/plain;charset=utf-8');
      state.showExportChoice = false;
      render();
    }

    function buildArmySheetPayload() {
      const totals = getTotals();
      const slots = getSlots();
      const roleOrder = { Hero: 0, Elite: 1, Core: 2, Support: 3, Other: 4 };
      const armyUnits = [...(state.armyUnits || [])].sort((a, b) => {
        const roleCompare = (roleOrder[a.unit?.role] ?? 99) - (roleOrder[b.unit?.role] ?? 99);
        if (roleCompare !== 0) return roleCompare;
        const familyCompare = getUnitFamilyName(a.unit).localeCompare(getUnitFamilyName(b.unit));
        if (familyCompare !== 0) return familyCompare;
        return String(a.unit?.name || '').localeCompare(String(b.unit?.name || ''));
      });

      const slotLabel = Object.entries(slots.total || {})
        .map(([slot, count]) => slot.charAt(0).toUpperCase() + slot.slice(1) + ' x' + count)
        .join('  |  ');
      const selectedMission = getSelectedMission();
      const selectedMap = getSelectedMap();

      return {
        title: 'Army Sheet',
        factionName: state.selectedFaction?.name || 'Army',
        scaleName: state.selectedScale?.name || '',
        totalLabel: totals.minerals + ' / ' + state.selectedScale.minerals + ' Minerals   |   ' + totals.gas + ' / ' + state.selectedScale.gas + ' Gas   |   Supply ' + totals.supply,
        slotLabel,
        mission: selectedMission ? {
          name: selectedMission.name,
          summary: 'Supply ' + selectedMission.supply + ' with +' + selectedMission.perRound + ' per round for ' + selectedMission.gameLength + ' rounds.',
          parameters: selectedMission.parameters || [],
          scoring: selectedMission.scoring || [],
          special: selectedMission.special || '',
          additionalRules: selectedMission.additionalRules || []
        } : null,
        map: selectedMap ? {
          name: selectedMap.name,
          size: selectedMap.size,
          width: selectedMap.width,
          height: selectedMap.height,
          blueZones: selectedMap.blueZones || [],
          redZones: selectedMap.redZones || [],
          markers: selectedMap.markers || [],
          summary: selectedMap.notes || '',
          markerSetup: selectedMap.markerSetup || [],
          blueSetup: selectedMap.blueSetup || null,
          redSetup: selectedMap.redSetup || null,
          notes: selectedMap.notes || ''
        } : null,
        units: armyUnits.map(entry => {
          const unit = entry.unit || {};
          const abilityList = [
            ...(unit.abilities || []).map(ability => ({
              name: ability.name,
              phase: ability.phase || 'Any',
              type: ability.type || '',
              description: ability.text || ability.description || ''
            })),
            ...flattenPhaseAbilities(unit.phaseAbilities).map(ability => ({
              name: ability.name,
              phase: ability.phase || 'Any',
              type: ability.type || '',
              description: ability.text || ability.description || ''
            }))
          ];
          return {
            name: unit.name,
            role: unit.role,
            costLabel: entry.cost + ' Minerals',
            costBreakdown: 'Selected Tier: ' + entry.tier.tier + '  |  Models ' + entry.tier.models + '  |  Supply ' + entry.tier.supply,
            stats: {
              speed: unit.stats?.speed ?? unit.move ?? unit.speed ?? '-',
              evade: unit.stats?.evade ?? unit.evade ?? '-',
              armour: unit.stats?.armour ?? unit.stats?.armor ?? unit.armour ?? unit.armor ?? '-',
              hp: unit.stats?.hp ?? unit.hp ?? '-',
              shield: unit.stats?.shield ?? unit.stats?.shields ?? unit.shields ?? unit.shield ?? '-',
              size: unit.stats?.size ?? unit.size ?? '-'
            },
            supplyBrackets: (unit.tiers || []).map(bracket => ({
              models: bracket.models,
              supply: bracket.supply,
              isActive: bracket.tier === entry.tier.tier
            })),
            weapons: (unit.weapons || []).map(weapon => ({
              name: weapon.name,
              phase: weapon.phase || 'Any',
              range: weapon.range ?? '-',
              target: weapon.target ?? '-',
              roa: weapon.attack ?? weapon.roa ?? '-',
              hit: weapon.hit ?? '-',
              surge: weapon.surge ?? '-',
              sDie: weapon.specialDie ?? weapon.sDie ?? '-',
              damage: weapon.damage ?? '-',
              keywords: weapon.keywords || []
            })),
            abilities: abilityList,
            upgrades: (entry.selectedUpgrades || []).map(upgrade => ({
              name: upgrade.name,
              costLabel: getResolvedUpgradeCostLabel(unit, entry.tier, upgrade) + ' Minerals',
              type: upgrade.type || '',
              description: upgrade.text || upgrade.description || ''
            }))
          };
        }),
        tacticalCards: (state.armyTactical || []).map(card => ({
          name: card.name,
          costLabel: (card.cost ?? 0) + ' Gas',
          meta: [card.phase, card.category].filter(Boolean).join(' | '),
          abilities: (card.abilities || []).map(ability => ({
            name: ability.name,
            phase: ability.phase || 'Any',
            type: ability.type || '',
            description: ability.text || ability.description || ''
          }))
        }))
      };
    }

    // ============================================================================
    // RENDER
    // ============================================================================
    function render() {
      const totals = getTotals();
      const slots = getSlots();
      const app = document.getElementById('app');
      const tabBar = document.getElementById('tabBar');

      // Group army units by role
      const armyByRole = {};
      ['Hero', 'Elite', 'Core', 'Support', 'Other'].forEach(role => {
        armyByRole[role] = state.armyUnits.filter(u => u.unit.role === role);
      });

      // Group library units by role
      const unitsByRole = {};
      ['Hero', 'Elite', 'Core', 'Support', 'Other'].forEach(role => {
        unitsByRole[role] = ZERG_UNITS.filter(u => u.role === role);
      });

      const unitIdsInArmy = state.armyUnits.map(u => u.unit.id);
      const tacticalIdsInArmy = state.armyTactical.map(t => t.id);

      let html = '';

      // Sticky Header - always compact style
      html += '<div class="sticky-header" id="stickyHeader">';
      
      // Resources
      html += '<div class="resource-stats">';
      html += '<div class="resource-stat"><div class="resource-stat-label">Minerals</div><div class="resource-stat-value minerals ' + (totals.mineralsOver ? 'over' : '') + '">' + (totals.mineralsLeft === 'inf' ? '&#8734;' : totals.mineralsLeft) + '</div></div>';
